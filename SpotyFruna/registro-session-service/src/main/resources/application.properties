spring.application.name=registro-session-service
server.port = 8100

# URL de conexión a Oracle. Cambia "localhost", "1521" y "XE" por tus datos
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=REGISTRO_SESSION_SERVICE
spring.datasource.password=12345
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Configuración específica de JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
